services:
  db:
    image: postgres:18-alpine
    container_name: db_ecommerce
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_ecommerce:/var/lib/postgresql/data

volumes:
  postgres_ecommerce:
    driver: local